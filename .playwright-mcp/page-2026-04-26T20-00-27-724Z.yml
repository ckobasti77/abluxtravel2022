                        - paragraph [ref=f10e67]:
                          - generic [ref=f10e68]: Alanja je bez dileme jedan od najslikovitijih turističkih centara Turske s kilometrima dugim peščanim plažama od kojih se svojom lepotom izdvaja ona s imenom Kleopatra.
